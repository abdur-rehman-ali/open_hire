<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block subject %}Open Hire{% endblock %}</title>
  <style>
    body { margin: 0; padding: 0; background-color: #f4f4f4; font-family: Arial, sans-serif; color: #333333; }
    .wrapper { width: 100%; padding: 40px 20px; }
    .container { max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .header { background-color: #1a1a2e; padding: 24px 32px; }
    .header h1 { margin: 0; color: #ffffff; font-size: 22px; font-weight: 700; letter-spacing: 1px; }
    .body { padding: 32px; font-size: 15px; line-height: 1.6; }
    .body a { color: #4f46e5; }
    .btn { display: inline-block; margin-top: 20px; padding: 12px 28px; background-color: #4f46e5; color: #ffffff !important; text-decoration: none; border-radius: 6px; font-weight: 600; font-size: 14px; }
    .footer { background-color: #f9f9f9; padding: 20px 32px; font-size: 12px; color: #888888; text-align: center; border-top: 1px solid #eeeeee; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="header">
        <h1>Open Hire</h1>
      </div>
      <div class="body">
        {% block body %}{% endblock %}
      </div>
      <div class="footer">
        &copy; Open Hire. You received this email because you have an account with us.
      </div>
    </div>
  </div>
</body>
</html>
